<svg width="100%" viewBox="0 0 680 760" xmlns="http://www.w3.org/2000/svg">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<style>
  svg { background: #ffffff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  .th { font-size: 13px; font-weight: 600; fill: #1a1a2e; }
  .ts { font-size: 11px; font-weight: 400; fill: #555566; }
  .arr { stroke: #888; stroke-width: 1.5; fill: none; }
  .leader { stroke: #aaa; stroke-width: 0.8; fill: none; }

  .c-gray  rect { fill: #f4f4f0; stroke: #b0b0a8; }
  .c-blue  rect { fill: #e6f1fb; stroke: #5a9fd4; }
  .c-blue  .th  { fill: #0c447c; }
  .c-blue  .ts  { fill: #185fa5; }
  .c-teal  rect { fill: #e1f5ee; stroke: #1d9e75; }
  .c-teal  .th  { fill: #085041; }
  .c-teal  .ts  { fill: #0f6e56; }
  .c-amber rect { fill: #faeeda; stroke: #ba7517; }
  .c-amber .th  { fill: #412402; }
  .c-amber .ts  { fill: #633806; }
  .c-coral rect { fill: #faece7; stroke: #d85a30; }
  .c-coral .th  { fill: #4a1b0c; }
  .c-coral .ts  { fill: #993c1d; }
  .c-purple rect { fill: #eeedfe; stroke: #7f77dd; }
  .c-purple .th  { fill: #26215c; }
  .c-purple .ts  { fill: #534ab7; }
  .c-green rect { fill: #eaf3de; stroke: #639922; }
  .c-green .th  { fill: #173404; }
  .c-green .ts  { fill: #3b6d11; }
  .c-pink  rect { fill: #fbeaf0; stroke: #d4537e; }
  .c-pink  .th  { fill: #4b1528; }
  .c-pink  .ts  { fill: #993556; }
  .zone-label { font-size: 11px; fill: #666; font-weight: 500; }
  .zone-sub   { font-size: 10px; fill: #999; }
  .flow-label { font-size: 10px; fill: #999; }
</style>
</defs>

<!-- ── Internet User ─────────────────────────────── -->
<g class="c-gray">
  <rect x="240" y="18" width="160" height="38" rx="8" stroke-width="0.5"/>
  <text class="th" x="320" y="37" text-anchor="middle" dominant-baseline="central">Internet user</text>
</g>
<line x1="320" y1="56" x2="320" y2="76" class="arr" marker-end="url(#arrow)" stroke="#5a9fd4"/>

<!-- ── Route 53 + ACM ────────────────────────────── -->
<g class="c-blue">
  <rect x="222" y="76" width="164" height="38" rx="8" stroke-width="0.5"/>
  <text class="th" x="304" y="95" text-anchor="middle" dominant-baseline="central">Amazon Route 53</text>
</g>

<g class="c-coral">
  <rect x="462" y="76" width="150" height="38" rx="8" stroke-width="0.5"/>
  <text class="th" x="537" y="88" text-anchor="middle" dominant-baseline="central">ACM Certificate</text>
  <text class="ts" x="537" y="106" text-anchor="middle" dominant-baseline="central">HTTPS / TLS</text>
</g>
<line x1="462" y1="95" x2="432" y2="148" class="leader" stroke-dasharray="4 3"/>
<line x1="304" y1="114" x2="304" y2="148" class="arr" marker-end="url(#arrow)" stroke="#5a9fd4"/>

<!-- ── VPC Container ──────────────────────────────── -->
<rect x="18" y="132" width="644" height="244" rx="12" fill="#fafafa" stroke="#c8c8c8" stroke-width="0.8" stroke-dasharray="6 3"/>
<text class="zone-label" x="32" y="150">VPC — 10.0.0.0/16</text>
<text class="zone-sub" x="32" y="168">Public subnets (AZ-1, AZ-2)</text>

<!-- ALB -->
<g class="c-blue">
  <rect x="176" y="154" width="268" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="310" y="172" text-anchor="middle" dominant-baseline="central">Application Load Balancer</text>
  <text class="ts" x="310" y="190" text-anchor="middle" dominant-baseline="central">SSL termination · HTTP→HTTPS redirect</text>
</g>
<line x1="310" y1="198" x2="310" y2="218" class="arr" marker-end="url(#arrow)" stroke="#1d9e75"/>

<text class="zone-sub" x="32" y="232">Private subnets (AZ-1, AZ-2)</text>

<!-- EC2 ASG -->
<g class="c-teal">
  <rect x="176" y="218" width="268" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="310" y="239" text-anchor="middle" dominant-baseline="central">EC2 Auto Scaling Group</text>
  <text class="ts" x="310" y="259" text-anchor="middle" dominant-baseline="central">Docker · WordPress · Blue/Green · min:2 max:4</text>
</g>

<!-- EC2 → EFS, Secrets, RDS arrows -->
<line x1="265" y1="274" x2="100" y2="298" class="arr" marker-end="url(#arrow)" stroke="#888"/>
<line x1="310" y1="274" x2="272" y2="298" class="arr" marker-end="url(#arrow)" stroke="#888"/>
<line x1="358" y1="274" x2="446" y2="298" class="arr" marker-end="url(#arrow)" stroke="#888"/>

<!-- EFS -->
<g class="c-amber">
  <rect x="26" y="298" width="132" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="92" y="316" text-anchor="middle" dominant-baseline="central">Amazon EFS</text>
  <text class="ts" x="92" y="334" text-anchor="middle" dominant-baseline="central">wp-content shared</text>
</g>

<!-- Secrets Manager -->
<g class="c-coral">
  <rect x="178" y="298" width="162" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="259" y="316" text-anchor="middle" dominant-baseline="central">Secrets Manager</text>
  <text class="ts" x="259" y="334" text-anchor="middle" dominant-baseline="central">DB credentials (no hardcode)</text>
</g>

<!-- RDS -->
<g class="c-amber">
  <rect x="362" y="298" width="152" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="438" y="316" text-anchor="middle" dominant-baseline="central">RDS MySQL 8.0</text>
  <text class="ts" x="438" y="334" text-anchor="middle" dominant-baseline="central">Private · multi-AZ ready</text>
</g>

<!-- ── CI/CD Pipeline Container ──────────────────── -->
<rect x="18" y="388" width="644" height="126" rx="12" fill="#fafafa" stroke="#c8c8c8" stroke-width="0.8" stroke-dasharray="6 3"/>
<text class="zone-label" x="32" y="406">CI/CD pipeline</text>

<!-- GitHub -->
<g class="c-gray">
  <rect x="46" y="410" width="96" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="94" y="432" text-anchor="middle" dominant-baseline="central">GitHub</text>
</g>
<line x1="142" y1="432" x2="170" y2="432" class="arr" marker-end="url(#arrow)" stroke="#7f77dd"/>

<!-- CodePipeline -->
<g class="c-purple">
  <rect x="170" y="410" width="126" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="233" y="432" text-anchor="middle" dominant-baseline="central">CodePipeline</text>
</g>
<line x1="296" y1="432" x2="324" y2="432" class="arr" marker-end="url(#arrow)" stroke="#7f77dd"/>

<!-- CodeBuild -->
<g class="c-purple">
  <rect x="324" y="405" width="178" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="413" y="426" text-anchor="middle" dominant-baseline="central">CodeBuild</text>
  <text class="ts" x="413" y="446" text-anchor="middle" dominant-baseline="central">Terraform + Docker + ECR push</text>
</g>
<line x1="502" y1="432" x2="528" y2="432" class="arr" marker-end="url(#arrow)" stroke="#7f77dd"/>

<!-- ECR -->
<g class="c-purple">
  <rect x="528" y="410" width="110" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="583" y="432" text-anchor="middle" dominant-baseline="central">Amazon ECR</text>
</g>

<!-- CodeBuild → CodeDeploy -->
<line x1="413" y1="461" x2="413" y2="530" class="arr" marker-end="url(#arrow)" stroke="#1d9e75"/>

<!-- CodeDeploy -->
<g class="c-teal">
  <rect x="316" y="530" width="194" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="413" y="548" text-anchor="middle" dominant-baseline="central">CodeDeploy</text>
  <text class="ts" x="413" y="566" text-anchor="middle" dominant-baseline="central">Blue/Green deployment</text>
</g>

<!-- CodeDeploy → EC2 (right margin routing) -->
<path d="M 510 552 L 652 552 L 652 246 L 444 246" fill="none" stroke="#999" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
<text class="flow-label" x="644" y="410" text-anchor="end">deploy</text>

<!-- ── Supporting Services ────────────────────────── -->
<g class="c-pink">
  <rect x="76" y="598" width="152" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="152" y="616" text-anchor="middle" dominant-baseline="central">CloudWatch</text>
  <text class="ts" x="152" y="634" text-anchor="middle" dominant-baseline="central">Metrics + Alarms</text>
</g>

<g class="c-green">
  <rect x="270" y="598" width="136" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="338" y="616" text-anchor="middle" dominant-baseline="central">S3 Buckets</text>
  <text class="ts" x="338" y="634" text-anchor="middle" dominant-baseline="central">Backup / Artifacts</text>
</g>

<!-- ── Disaster Recovery ──────────────────────────── -->
<line x1="32" y1="660" x2="648" y2="660" stroke="#ddd" stroke-width="0.8"/>
<text class="zone-label" x="32" y="674">Disaster recovery</text>

<g class="c-green">
  <rect x="44" y="682" width="124" height="40" rx="8" stroke-width="0.5"/>
  <text class="th" x="106" y="702" text-anchor="middle" dominant-baseline="central">S3 DR Bucket</text>
</g>
<line x1="168" y1="702" x2="206" y2="702" class="arr" marker-end="url(#arrow)" stroke="#639922"/>

<g class="c-green">
  <rect x="206" y="682" width="142" height="40" rx="8" stroke-width="0.5"/>
  <text class="th" x="277" y="694" text-anchor="middle" dominant-baseline="central">CloudFront CDN</text>
  <text class="ts" x="277" y="712" text-anchor="middle" dominant-baseline="central">OAC · HTTPS · Cache</text>
</g>
<line x1="348" y1="702" x2="392" y2="702" class="arr" marker-end="url(#arrow)" stroke="#639922"/>

<g class="c-blue">
  <rect x="392" y="682" width="180" height="40" rx="8" stroke-width="0.5"/>
  <text class="th" x="482" y="702" text-anchor="middle" dominant-baseline="central">dr.ganeshc.shop</text>
</g>

<!-- Footer flow label -->
<text class="flow-label" x="340" y="742" text-anchor="middle">ganeshc.shop → Route 53 → ALB → EC2 → WordPress</text>
</svg>
