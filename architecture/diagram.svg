<svg width="900" height="820" viewBox="0 0 900 820" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    svg { background: #ffffff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; }
    .title  { font-size: 22px; font-weight: 700; fill: #1a1a2e; }
    .label  { font-size: 13px; font-weight: 600; fill: #1a1a2e; }
    .sub    { font-size: 11px; font-weight: 400; fill: #555; }
    .zone   { font-size: 11px; font-weight: 600; fill: #888; }
    .flow   { font-size: 10px; fill: #aaa; }
    .arr    { stroke: #aaa; stroke-width: 1.5; fill: none; }
    .arr-blue   { stroke: #378add; stroke-width: 1.5; fill: none; }
    .arr-green  { stroke: #1d9e75; stroke-width: 1.5; fill: none; }
    .arr-purple { stroke: #7f77dd; stroke-width: 1.5; fill: none; }
    .arr-dash   { stroke: #bbb; stroke-width: 1; fill: none; stroke-dasharray: 5 3; }
  </style>
</defs>

<!-- Title -->
<text class="title" x="450" y="36" text-anchor="middle">AWS WordPress — Highly Available + DR Architecture</text>
<text class="sub" x="450" y="56" text-anchor="middle">VPC · EC2 · RDS · EFS · ALB · ASG · ECR · CodePipeline · CodeDeploy · Route53 · S3 · CloudFront</text>

